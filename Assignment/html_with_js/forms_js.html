<!DOCTYPE html>
<html>
<head>
  <title>Hire Me Form</title>

  <style>

    body {
      background-color: #e6f0ff;
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 40px;
    }

    .container {
      background-color: white;
      max-width: 500px;
      margin: auto;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      color: #2b2d42;
    }

    label {
      font-weight: bold;
      color: #333;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      height: 100px;
      resize: none;
    }

    input[type="submit"] {
      background-color: #118ab2;
      color: white;
      border: none;
      cursor: pointer;
      font-size: 16px;
    }

    input[type="submit"]:hover {
      background-color: #073b4c;
    }

    .home {
      text-align: center;
      margin-top: 20px;
    }

    a {
      text-decoration: none;
      color: white;
      background-color: #ef476f;
      padding: 10px 20px;
      border-radius: 8px;
    }

    a:hover {
      background-color: #c9184a;
    }

  </style>

  <script>

    function validateForm() {

      let fname = document.forms["myForm"]["fname"].value;
      let lname = document.forms["myForm"]["lname"].value;
      let usn = document.forms["myForm"]["usn"].value;

      if(fname == "" || lname == "" || usn == "") {

        alert("⚠ Please fill all required fields!");
        return false;

      }

      else {

        alert("✅ Form Submitted Successfully!");
        return true;

      }
    }

  </script>

</head>

<body>

  <div class="container">

    <h2>Student Feedback Form</h2>

    <form name="myForm" onsubmit="return validateForm()">

      <label>First Name:</label><br>
      <input type="text" name="fname" placeholder="Enter First Name"><br><br>

      <label>Last Name:</label><br>
      <input type="text" name="lname" placeholder="Enter Last Name"><br><br>

      <label>Courses:</label><br>
      <select name="course">

        <option value="">--Please choose an option--</option>
        <option value="OS">OS</option>
        <option value="ESD">ESD</option>
        <option value="Research">Research</option>
        <option value="Java">Java</option>

      </select><br><br>

      <label>USN:</label><br>
      <input type="text" name="usn" placeholder="Enter USN"><br><br>

      <label>Feedback:</label><br>
      <textarea name="feedback" placeholder="Enter your feedback"></textarea><br><br>

      <input type="submit" value="Submit">

    </form>

  </div>

  <div class="home">

    <a href="https://boiprateek07.github.io/sem4-fet/">
      🏠 Home Page
    </a>

  </div>

</body>
</html>
