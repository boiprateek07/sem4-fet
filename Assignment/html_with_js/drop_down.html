<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pull Down Menu and List Box</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#dbeafe,#f5d0fe);
}

.container{
    width:420px;
    padding:35px;
    background:white;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
}

h1{
    color:#6d28d9;
    margin-bottom:20px;
}

h2{
    color:#374151;
    margin-top:15px;
    margin-bottom:10px;
}

select{
    width:100%;
    padding:12px;
    border:2px solid #c4b5fd;
    border-radius:12px;
    outline:none;
    background:#f9fafb;
    font-size:16px;
}

select:focus{
    border:2px solid #8b5cf6;
}

button{
    margin-top:18px;
    padding:12px 24px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#8b5cf6,#6366f1);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

p{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
    color:#4c1d95;
}

hr{
    margin:25px 0;
    border:1px solid #ddd6fe;
}

#homepage{
    display:inline-block;
    margin-top:20px;
    padding:12px 22px;
    background:#c4b5fd;
    border-radius:20px;
    text-decoration:none;
    color:#1f2937;
    font-weight:bold;
}

#homepage:hover{
    background:#a78bfa;
}

</style>

</head>

<body>

<div class="container">

    <h1>JavaScript Menu Demo</h1>

    <!-- Pull Down Menu -->

    <h2>Select Course</h2>

    <select id="course">

        <option value="">-- Select Course --</option>
        <option value="Java">Java</option>
        <option value="Python">Python</option>
        <option value="JavaScript">JavaScript</option>

    </select>

    <p id="courseResult"></p>

    <hr>

    <!-- List Box -->

    <h2>Select Hobby</h2>

    <select id="hobby" size="4">

        <option>Reading</option>
        <option>Gaming</option>
        <option>Music</option>
        <option>Traveling</option>

    </select>

    <br>

    <!-- Event Handler -->

    <button onclick="showHobby()">
        Show Hobby
    </button>

    <p id="hobbyResult"></p>

    <a id="homepage"
       href="https://boiprateek07.github.io/sem4-fet/">
       🏠 Home Page
    </a>

</div>

<script>

    // Event Listener for Pull Down Menu

    document.getElementById("course").addEventListener("change", function(){

        document.getElementById("courseResult").innerHTML =
        "Selected Course : " + this.value;

    });

    // Event Handler Function

    function showHobby(){

        let hobby = document.getElementById("hobby").value;

        document.getElementById("hobbyResult").innerHTML =
        "Selected Hobby : " + hobby;
    }

</script>

</body>
</html>
